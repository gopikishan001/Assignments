
provider: "grok"

providers:
  grok:
    api_key: ""
    base_url: "https://api.groq.com/openai/v1"
    model: "llama-3.1-8b-instant"

processing:

  # LLM Parameters
  max_tokens: 2000
  temperature: 0

  # Resume Size Controls
  max_file_size_mb: 3
  max_extracted_chars: 100000

  # API Reliability
  retry_limit: 5
  retry_delay: 5

  # Request Timeout
  timeout_seconds: 120

paths:
  resume_folder: "./resumes"
  output_file: "./output/results.json"
  failed_output_file: "./output/failed_results.json"

prompts:
  system_prompt_file: "./prompts/system_prompt.txt"
  user_prompt_file: "./prompts/user_prompt.txt"

supported_extensions:
  - ".pdf"
  - ".docx"
  - ".doc"